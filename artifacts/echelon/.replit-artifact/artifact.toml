kind = "web"
previewPath = "/"
title = "Echelon Chiropractic"
version = "1.0.0"
id = "artifacts/echelon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20781

[services.development]
run = "pnpm --filter @workspace/echelon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echelon", "run", "build" ]
publicDir = "artifacts/echelon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20781"
BASE_PATH = "/"
